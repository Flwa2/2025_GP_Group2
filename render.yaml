services:
  - type: web
    name: wecast
    env: python
    # apt.txt installs ffmpeg on Render native Python; build step verifies binaries
    buildCommand: pip install -r requirements.txt && ffmpeg -version && ffprobe -version
    startCommand: gunicorn app:app --worker-class gthread --threads 2 --timeout 900 --graceful-timeout 120 --workers 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_FROM_NAME
        value: WeCast
      - key: WECAST_SUPPORT_EMAIL
        sync: false
      - key: WECAST_APP_URL
        value: https://wecastsa.com
      - key: FRONTEND_PUBLIC_URL
        value: https://wecastsa.com
      - key: FLASK_ENV
        value: production
      - key: GUNICORN_CMD_ARGS
        value: --worker-class gthread --threads 2 --timeout 900 --graceful-timeout 120 --workers 1
      - key: WECAST_GUNICORN_WORKER_CLASS
        value: gthread
      - key: WECAST_GUNICORN_THREADS
        value: "2"
      - key: WECAST_GUNICORN_TIMEOUT
        value: "900"
      - key: WECAST_GUNICORN_GRACEFUL_TIMEOUT
        value: "120"
      - key: FRONTEND_ORIGINS
        value: https://wecastsa.com,https://www.wecastsa.com,http://localhost:5173,http://127.0.0.1:5173
      - key: CORS_ORIGINS
        value: https://wecastsa.com,https://www.wecastsa.com,http://localhost:5173,http://127.0.0.1:5173
      - key: WECAST_AUDIO_INCLUDE_MUSIC
        value: "0"
      - key: AUDIO_SKIP_GPT_CHAPTERS
        value: "1"
      - key: WECAST_AUDIO_MAX_WORDS_HARD
        value: "6000"
      - key: WECAST_AUDIO_MAX_SEGMENTS_HARD
        value: "200"
      - key: WECAST_AUDIO_MAX_DURATION_HARD
        value: "3600"
      - key: WECAST_AUDIO_MAX_TTS_REQUESTS_HARD
        value: "260"
      - key: WECAST_AUDIO_MAX_MEMORY_MB_HARD
        value: "1700"
      - key: WECAST_AUDIO_TTS_CHUNK_CHARS
        value: "900"
      - key: WECAST_AUDIO_SAFE_EMERGENCY_MODE
        value: "1"
      - key: WECAST_AUDIO_TTS_FORMAT
        value: mp3_44100_64
  - type: static
    name: wecast-frontend
    rootDir: static/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # MUST be the Flask backend — NOT https://wecastsa.com (static host returns empty/HTML for /api/*)
      - key: VITE_API_BASE_URL
        value: https://wecast.onrender.com
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
